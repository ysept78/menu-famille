<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Famille</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #4a7c59;
  --primary-light: #6a9e78;
  --primary-dark: #3a6249;
  --accent: #e8a838;
  --bg: #f5f0e8;
  --card: #ffffff;
  --text: #2c2c2c;
  --text-light: #666;
  --border: #e0d8cc;
  --danger: #c0392b;
  --success: #27ae60;
}
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  padding: 1rem 1.5rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  position: sticky;
  top: 0;
  z-index: 100;
}
header h1 { font-size: 1.5rem; font-weight: 700; }
header p { font-size: 0.85rem; opacity: 0.85; margin-top: 0.2rem; }
nav {
  display: flex;
  gap: 0.5rem;
  background: white;
  padding: 0.5rem 1rem;
  border-bottom: 2px solid var(--border);
  overflow-x: auto;
  position: sticky;
  top: 68px;
  z-index: 99;
}
nav button {
  padding: 0.6rem 1.2rem;
  border: 2px solid var(--border);
  background: white;
  border-radius: 25px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  white-space: nowrap;
  transition: all 0.2s;
}
nav button:hover { border-color: var(--primary); color: var(--primary); }
nav button.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
.container { max-width: 1100px; margin: 0 auto; padding: 1rem; }
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 1.2rem;
  margin-bottom: 1rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  border: 1px solid var(--border);
}
.card h3 {
  color: var(--primary);
  margin-bottom: 0.8rem;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.week-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.week-nav { display: flex; gap: 0.5rem; align-items: center; }
.week-nav button {
  padding: 0.4rem 0.8rem;
  border: 1px solid var(--border);
  background: white;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
}
.week-nav button:hover { background: var(--primary); color: white; }
.week-label {
  font-weight: 600;
  font-size: 1.1rem;
  min-width: 180px;
  text-align: center;
}
.day-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 0.8rem;
}
.day-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.day-card .day-name {
  background: var(--primary);
  color: white;
  padding: 0.5rem 0.8rem;
  font-weight: 600;
  font-size: 0.9rem;
}
.day-card .day-name.weekend {
  background: var(--accent);
}
.day-card .meals { padding: 0.6rem 0.8rem; }
.meal-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.4rem 0;
  border-bottom: 1px solid #f0f0f0;
}
.meal-row:last-child { border-bottom: none; }
.meal-label { font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; font-weight: 600; }
.meal-name { font-size: 0.85rem; flex: 1; margin: 0 0.5rem; }
.meal-row button {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1rem;
  opacity: 0.5;
  padding: 0.2rem;
}
.meal-row button:hover { opacity: 1; }
.shopping-section { margin-bottom: 1.5rem; }
.shopping-section h4 {
  font-size: 0.95rem;
  color: var(--primary);
  padding: 0.5rem 0;
  border-bottom: 2px solid var(--primary-light);
  margin-bottom: 0.5rem;
}
.shopping-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 0.3rem;
  border-bottom: 1px solid #f5f5f5;
  cursor: pointer;
  user-select: none;
}
.shopping-item:hover { background: #fafafa; }
.shopping-item.checked .item-text {
  text-decoration: line-through;
  color: #aaa;
}
.shopping-item input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--success);
  cursor: pointer;
}
.item-text { font-size: 0.9rem; }
.item-qty { font-size: 0.8rem; color: var(--text-light); margin-left: auto; }
.btn {
  padding: 0.6rem 1.2rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-accent { background: var(--accent); color: white; }
.btn-accent:hover { background: #d49530; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #a93226; }
.btn-outline {
  background: white;
  border: 2px solid var(--primary);
  color: var(--primary);
}
.btn-outline:hover { background: var(--primary); color: white; }
.btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-weight: 600; margin-bottom: 0.3rem; font-size: 0.9rem; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%;
  padding: 0.6rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.9rem;
  font-family: inherit;
}
.form-group textarea { resize: vertical; min-height: 80px; }
.tag { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
.tag-easy { background: #d5f5e3; color: #1e8449; }
.tag-medium { background: #fdebd0; color: #d68910; }
.tag-balance { background: #d4efdf; color: #1a7a3a; }
.tag-plaisir { background: #fce4b8; color: #b87d15; }
.recipe-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 0.8rem;
}
.recipe-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  cursor: pointer;
  transition: all 0.2s;
}
.recipe-card:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.recipe-card h4 { margin-bottom: 0.3rem; }
.recipe-card p { font-size: 0.8rem; color: var(--text-light); }
.recipe-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 200;
  padding: 1rem;
}
.modal {
  background: white;
  border-radius: 12px;
  padding: 1.5rem;
  max-width: 500px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h3 { margin-bottom: 1rem; }
.modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }
.recipe-select-list { max-height: 300px; overflow-y: auto; }
.recipe-select-item {
  padding: 0.6rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 0.4rem;
  cursor: pointer;
  transition: all 0.15s;
}
.recipe-select-item:hover { background: #e8f5e9; border-color: var(--primary); }
.week-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
.week-chip {
  padding: 0.4rem 0.8rem;
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.15s;
}
.week-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
.progress-bar { background: #eee; border-radius: 10px; height: 8px; margin: 0.5rem 0; }
.progress-fill { background: var(--success); height: 100%; border-radius: 10px; transition: width 0.3s; }
.stats { display: flex; gap: 1rem; font-size: 0.85rem; color: var(--text-light); }
.print-actions { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
.add-item-row {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.5rem;
  padding: 0.5rem 0;
}
.add-item-row input {
  flex: 1;
  padding: 0.5rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.9rem;
}
.macro-info {
  display: flex;
  gap: 0.8rem;
  margin-top: 0.3rem;
  font-size: 0.75rem;
}
.macro-info span {
  padding: 0.15rem 0.5rem;
  border-radius: 10px;
  font-weight: 600;
}
.macro-p { background: #fde8e8; color: #c0392b; }
.macro-g { background: #fef3cd; color: #856404; }
.macro-l { background: #e8f4fd; color: #2471a3; }
@media (max-width: 600px) {
  .day-grid { grid-template-columns: 1fr; }
  nav { gap: 0.3rem; padding: 0.4rem 0.5rem; }
  nav button { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
  .container { padding: 0.5rem; }
}
.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <h1>Menu Famille</h1>
  <p id="headerDate"></p>
</header>

<nav>
  <button class="active" onclick="showTab('planning')">Planning</button>
  <button onclick="showTab('courses')">Liste de courses</button>
  <button onclick="showTab('recettes')">Mes recettes</button>
</nav>

<div class="container">
  <!-- PLANNING TAB -->
  <div id="tab-planning">
    <div class="week-header">
      <div class="week-nav">
        <button onclick="changeWeek(-1)">&larr;</button>
        <span class="week-label" id="weekLabel"></span>
        <button onclick="changeWeek(1)">&rarr;</button>
      </div>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" onclick="goToCurrentWeek()">Semaine actuelle</button>
        <button class="btn btn-primary btn-sm" onclick="generateShoppingList()">Courses de la semaine</button>
      </div>
    </div>
    <div class="day-grid" id="dayGrid"></div>
  </div>

  <!-- COURSES TAB -->
  <div id="tab-courses" class="hidden">
    <div class="card">
      <h3>Semaines</h3>
      <div class="week-selector" id="weekSelector"></div>
    </div>
    <div class="print-actions">
      <button class="btn btn-primary btn-sm" onclick="printList()">Imprimer la liste</button>
      <button class="btn btn-outline btn-sm" onclick="uncheckAll()">Tout decocher</button>
      <button class="btn btn-danger btn-sm" onclick="clearChecked()">Supprimer les coches</button>
    </div>
    <div id="shoppingContent"></div>
    <div class="card">
      <h3>Ajouter un article</h3>
      <div class="add-item-row">
        <input type="text" id="customItemInput" placeholder="Ex: Sopalin, Lessive..." onkeydown="if(event.key==='Enter')addCustomItem()">
        <button class="btn btn-primary btn-sm" onclick="addCustomItem()">Ajouter</button>
      </div>
    </div>
  </div>

  <!-- RECETTES TAB -->
  <div id="tab-recettes" class="hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem">
      <h2>Mes recettes</h2>
      <button class="btn btn-primary" onclick="showRecipeForm()">+ Nouvelle recette</button>
    </div>
    <div style="margin-bottom:1rem">
      <input type="text" id="recipeSearch" placeholder="Rechercher une recette..." style="width:100%;padding:0.6rem;border:1px solid var(--border);border-radius:8px;font-size:0.9rem" oninput="renderRecipes()">
    </div>
    <div class="recipe-grid" id="recipeGrid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const DAYS = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const MEALS = ['midi','soir'];

const DEFAULT_RECIPES = [
  // ===== SEMAINE : EQUILIBRE (proteines + sucres lents + legumes) =====
  // Poulet / Dinde
  {id:'e1',name:'Poulet grille, patate douce et brocolis',category:'Plat',type:'equilibre',difficulty:'facile',time:30,
    ingredients:[{name:'Blancs de poulet',qty:'4',cat:'Viandes'},{name:'Patates douces',qty:'600g',cat:'Legumes'},{name:'Brocolis',qty:'1 tete',cat:'Legumes'},{name:'Huile olive',qty:'2 cs',cat:'Epicerie'},{name:'Paprika',qty:'',cat:'Epicerie'}],
    steps:'Couper patates douces en cubes, enfourner 200C 20min avec huile et paprika. Griller les blancs de poulet a la poele 6min/face. Cuire brocolis vapeur 8min. Servir ensemble.'},
  {id:'e2',name:'Emince de dinde aux legumes et riz complet',category:'Plat',type:'equilibre',difficulty:'facile',time:25,
    ingredients:[{name:'Emince de dinde',qty:'500g',cat:'Viandes'},{name:'Riz complet',qty:'300g',cat:'Feculents'},{name:'Courgettes',qty:'2',cat:'Legumes'},{name:'Poivrons',qty:'2',cat:'Legumes'},{name:'Sauce soja',qty:'3 cs',cat:'Epicerie'},{name:'Ail',qty:'2 gousses',cat:'Legumes'},{name:'Huile olive',qty:'',cat:'Epicerie'}],
    steps:'Cuire le riz complet (25min). Faire sauter la dinde emincee a feu vif. Ajouter legumes coupes en laniere, ail, sauce soja. Cuire 8min en remuant. Servir sur le riz.'},
  {id:'e3',name:'Poulet curry, lentilles corail et epinards',category:'Plat',type:'equilibre',difficulty:'facile',time:25,
    ingredients:[{name:'Blancs de poulet',qty:'4',cat:'Viandes'},{name:'Lentilles corail',qty:'250g',cat:'Feculents'},{name:'Epinards frais',qty:'200g',cat:'Legumes'},{name:'Lait de coco',qty:'20cl',cat:'Epicerie'},{name:'Curry',qty:'2 cc',cat:'Epicerie'},{name:'Oignon',qty:'1',cat:'Legumes'},{name:'Tomates concassees',qty:'400g',cat:'Conserves'}],
    steps:'Faire revenir oignon et poulet coupe en morceaux avec le curry. Ajouter tomates et lentilles. Couvrir d eau, cuire 15min. Ajouter lait de coco et epinards en fin. Servir tel quel ou avec un peu de riz.'},
  {id:'e4',name:'Wok de poulet, nouilles et legumes croquants',category:'Plat',type:'equilibre',difficulty:'facile',time:20,
    ingredients:[{name:'Blancs de poulet',qty:'400g',cat:'Viandes'},{name:'Nouilles chinoises',qty:'300g',cat:'Feculents'},{name:'Carottes',qty:'2',cat:'Legumes'},{name:'Chou chinois',qty:'1/2',cat:'Legumes'},{name:'Sauce soja',qty:'4 cs',cat:'Epicerie'},{name:'Huile sesame',qty:'1 cs',cat:'Epicerie'},{name:'Gingembre frais',qty:'1 morceau',cat:'Legumes'}],
    steps:'Cuire les nouilles. Emincer poulet et legumes. Saisir le poulet a feu vif, reserver. Faire sauter les legumes 3min. Ajouter nouilles, poulet, soja, sesame, gingembre rape. Melanger 2min.'},

  // Boeuf
  {id:'e5',name:'Boeuf aux oignons, riz basmati et haricots verts',category:'Plat',type:'equilibre',difficulty:'facile',time:25,
    ingredients:[{name:'Boeuf a emincer',qty:'500g',cat:'Viandes'},{name:'Riz basmati',qty:'300g',cat:'Feculents'},{name:'Haricots verts',qty:'400g',cat:'Legumes'},{name:'Oignons',qty:'3',cat:'Legumes'},{name:'Sauce soja',qty:'3 cs',cat:'Epicerie'},{name:'Huile olive',qty:'',cat:'Epicerie'}],
    steps:'Cuire le riz. Cuire haricots verts 10min vapeur. Saisir le boeuf emince a feu tres vif 2min. Reserver. Faire carameliser les oignons 10min. Reunir avec sauce soja. Servir avec riz et haricots.'},
  {id:'e6',name:'Chili con carne maison',category:'Plat',type:'equilibre',difficulty:'facile',time:35,
    ingredients:[{name:'Viande hachee 5%',qty:'500g',cat:'Viandes'},{name:'Haricots rouges',qty:'2 boites',cat:'Conserves'},{name:'Tomates concassees',qty:'400g',cat:'Conserves'},{name:'Mais',qty:'1 boite',cat:'Conserves'},{name:'Oignon',qty:'1',cat:'Legumes'},{name:'Poivron',qty:'1',cat:'Legumes'},{name:'Cumin',qty:'2 cc',cat:'Epicerie'},{name:'Riz basmati',qty:'250g',cat:'Feculents'}],
    steps:'Faire revenir oignon et poivron. Ajouter viande hachee, faire dorer. Ajouter tomates, haricots rouges, mais, cumin. Mijoter 20min. Servir avec riz basmati.'},
  {id:'e7',name:'Steak, lentilles vertes et carottes',category:'Plat',type:'equilibre',difficulty:'facile',time:35,
    ingredients:[{name:'Steaks haches 5%',qty:'4',cat:'Viandes'},{name:'Lentilles vertes',qty:'300g',cat:'Feculents'},{name:'Carottes',qty:'4',cat:'Legumes'},{name:'Oignon',qty:'1',cat:'Legumes'},{name:'Bouillon de legumes',qty:'1 cube',cat:'Epicerie'},{name:'Moutarde',qty:'',cat:'Epicerie'}],
    steps:'Cuire lentilles 25min avec carottes coupees, oignon et bouillon. Griller les steaks a la poele 3min/face. Servir steaks sur lit de lentilles-carottes, moutarde a cote.'},

  // Poisson
  {id:'e8',name:'Saumon, riz complet et courgettes grillees',category:'Plat',type:'equilibre',difficulty:'facile',time:25,
    ingredients:[{name:'Paves de saumon',qty:'4',cat:'Poissons'},{name:'Riz complet',qty:'300g',cat:'Feculents'},{name:'Courgettes',qty:'3',cat:'Legumes'},{name:'Citron',qty:'1',cat:'Fruits'},{name:'Huile olive',qty:'2 cs',cat:'Epicerie'},{name:'Aneth',qty:'',cat:'Epicerie'}],
    steps:'Cuire riz complet. Couper courgettes en rondelles, griller a la poele avec huile. Cuire saumon 4min/face a la poele. Servir avec citron et aneth.'},
  {id:'e9',name:'Dos de cabillaud, puree de pois casses et poireaux',category:'Plat',type:'equilibre',difficulty:'facile',time:30,
    ingredients:[{name:'Dos de cabillaud',qty:'4 filets',cat:'Poissons'},{name:'Pois casses',qty:'250g',cat:'Feculents'},{name:'Poireaux',qty:'3',cat:'Legumes'},{name:'Beurre',qty:'20g',cat:'Frais'},{name:'Citron',qty:'1',cat:'Fruits'},{name:'Bouillon',qty:'1 cube',cat:'Epicerie'}],
    steps:'Cuire pois casses 25min dans le bouillon, ecraser en puree avec beurre. Emincer et faire fondre les poireaux 10min. Cuire cabillaud a la poele 4min/face. Servir ensemble.'},
  {id:'e10',name:'Papillote de poisson, pommes de terre et legumes',category:'Plat',type:'equilibre',difficulty:'facile',time:30,
    ingredients:[{name:'Filets de poisson blanc',qty:'4',cat:'Poissons'},{name:'Pommes de terre',qty:'600g',cat:'Legumes'},{name:'Tomates cerises',qty:'250g',cat:'Legumes'},{name:'Courgette',qty:'1',cat:'Legumes'},{name:'Citron',qty:'1',cat:'Fruits'},{name:'Herbes de Provence',qty:'',cat:'Epicerie'},{name:'Huile olive',qty:'',cat:'Epicerie'}],
    steps:'Couper PDT en rondelles fines, precuire 10min a l eau. Dans du papier alu : PDT, poisson, legumes coupes, filet de citron, herbes, huile. Fermer. Four 200C 20min.'},

  // Oeufs / Vegetarien
  {id:'e11',name:'Omelette aux legumes et pain complet',category:'Plat',type:'equilibre',difficulty:'facile',time:15,
    ingredients:[{name:'Oeufs',qty:'8',cat:'Frais'},{name:'Champignons',qty:'200g',cat:'Legumes'},{name:'Poivrons',qty:'1',cat:'Legumes'},{name:'Tomates',qty:'2',cat:'Legumes'},{name:'Gruyere rape',qty:'80g',cat:'Frais'},{name:'Pain complet',qty:'4 tranches',cat:'Boulangerie'},{name:'Beurre',qty:'20g',cat:'Frais'}],
    steps:'Faire revenir champignons et poivrons 5min. Battre les oeufs, verser dans la poele avec legumes. Fromage au centre. Plier. Servir avec pain complet grille et tomate.'},
  {id:'e12',name:'Dahl de lentilles corail, riz et yaourt',category:'Plat',type:'equilibre',difficulty:'facile',time:25,
    ingredients:[{name:'Lentilles corail',qty:'300g',cat:'Feculents'},{name:'Riz basmati',qty:'250g',cat:'Feculents'},{name:'Tomates concassees',qty:'400g',cat:'Conserves'},{name:'Oignon',qty:'1',cat:'Legumes'},{name:'Ail',qty:'2 gousses',cat:'Legumes'},{name:'Curcuma',qty:'1 cc',cat:'Epicerie'},{name:'Cumin',qty:'1 cc',cat:'Epicerie'},{name:'Lait de coco',qty:'20cl',cat:'Epicerie'},{name:'Yaourt nature',qty:'4',cat:'Frais'}],
    steps:'Revenir oignon et ail. Ajouter epices, tomates, lentilles et eau. Cuire 15min. Ajouter lait de coco. Cuire riz a part. Servir avec yaourt.'},
  {id:'e13',name:'Shakshuka (oeufs en sauce tomate) et semoule',category:'Plat',type:'equilibre',difficulty:'facile',time:20,
    ingredients:[{name:'Oeufs',qty:'6',cat:'Frais'},{name:'Tomates concassees',qty:'800g',cat:'Conserves'},{name:'Poivrons',qty:'2',cat:'Legumes'},{name:'Oignon',qty:'1',cat:'Legumes'},{name:'Ail',qty:'2 gousses',cat:'Legumes'},{name:'Cumin',qty:'1 cc',cat:'Epicerie'},{name:'Semoule complete',qty:'300g',cat:'Feculents'},{name:'Feta',qty:'100g',cat:'Frais'}],
    steps:'Faire revenir oignon, poivrons et ail. Ajouter tomates et cumin, mijoter 10min. Creuser des puits, casser les oeufs dedans. Couvrir 5min. Feta emietee dessus. Servir avec semoule.'},

// ============ STATE ============
// Force reset to get new recipes
let state = loadState();
let currentWeek = getCurrentWeekIndex();
let shoppingWeek = currentWeek;

function loadState() {
  const saved = localStorage.getItem('menuFamille_v2');
  if (saved) return JSON.parse(saved);
  return freshState();
}

function freshState() {
  return {
    recipes: [...DEFAULT_RECIPES],
    menus: generateDefaultMenus(),
    shopping: {},
    customItems: [],
    startDate: getMonday(new Date()).toISOString().split('T')[0]
  };
}

function saveState() {
  localStorage.setItem('menuFamille_v2', JSON.stringify(state));
}

function resetAll() {
  if (!confirm('Reinitialiser tous les menus et recettes ? Les modifications seront perdues.')) return;
  localStorage.removeItem('menuFamille_v2');
  state = freshState();
  saveState();
  currentWeek = 0;
  renderPlanning();
}

function getMonday(d) {
  d = new Date(d);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff));
}

function getCurrentWeekIndex() {
  const start = new Date(state.startDate);
  const now = getMonday(new Date());
  const diff = Math.floor((now - start) / (7 * 24 * 60 * 60 * 1000));
  return Math.max(0, Math.min(12, diff));
}

function getWeekDates(weekIdx) {
  const start = new Date(state.startDate);
  start.setDate(start.getDate() + weekIdx * 7);
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  const fmt = d => d.toLocaleDateString('fr-FR', {day:'numeric',month:'short'});
  return `${fmt(start)} - ${fmt(end)}`;
}

function getRecipe(id) {
  return state.recipes.find(r => r.id === id);
}

// ============ TABS ============
function showTab(tab) {
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
  document.getElementById('tab-' + tab).classList.remove('hidden');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (tab === 'courses') renderShopping();
  if (tab === 'recettes') renderRecipes();
}

// ============ PLANNING ============
function renderPlanning() {
  document.getElementById('weekLabel').textContent = `Semaine ${currentWeek + 1}/13 — ${getWeekDates(currentWeek)}`;
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = '';
  DAYS.forEach((day, di) => {
    const isWeekend = di >= 5;
    const card = document.createElement('div');
    card.className = 'day-card';
    let mealsHtml = '';
    MEALS.forEach(meal => {
      const key = `${currentWeek}-${di}-${meal}`;
      const recipeId = state.menus[key];
      const recipe = recipeId ? getRecipe(recipeId) : null;
      const typeTag = recipe ? (recipe.type === 'plaisir'
        ? '<span class="tag tag-plaisir" style="font-size:0.65rem;margin-left:0.3rem">plaisir</span>'
        : '<span class="tag tag-balance" style="font-size:0.65rem;margin-left:0.3rem">equilibre</span>') : '';
      mealsHtml += `
        <div class="meal-row">
          <span class="meal-label">${meal === 'midi' ? 'Midi' : 'Soir'}</span>
          <span class="meal-name">${recipe ? recipe.name + typeTag : '<i style="color:#aaa">Aucun</i>'}</span>
          <button onclick="chooseMeal(${currentWeek},${di},'${meal}')" title="Changer">&#9998;</button>
          ${recipe ? `<button onclick="removeMeal(${currentWeek},${di},'${meal}')" title="Supprimer">&times;</button>` : ''}
        </div>`;
    });
    card.innerHTML = `<div class="day-name ${isWeekend ? 'weekend' : ''}">${day} ${isWeekend ? '(plaisir)' : ''}</div><div class="meals">${mealsHtml}</div>`;
    grid.appendChild(card);
  });
}

function changeWeek(delta) {
  currentWeek = Math.max(0, Math.min(12, currentWeek + delta));
  renderPlanning();
}

function goToCurrentWeek() {
  currentWeek = getCurrentWeekIndex();
  renderPlanning();
}

function chooseMeal(week, day, meal) {
  const modal = document.getElementById('modalContent');
  const search = `<input type="text" id="mealSearch" placeholder="Rechercher..." style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:8px;margin-bottom:0.5rem;font-size:0.9rem" oninput="filterMealList(${week},${day},'${meal}')">`;
  const list = renderMealSelectList(state.recipes, week, day, meal);
  modal.innerHTML = `<h3>Choisir un plat</h3>${search}<div class="recipe-select-list" id="mealList">${list}</div>
    <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Annuler</button></div>`;
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function renderMealSelectList(recipes, week, day, meal) {
  return recipes.map(r => {
    const typeLabel = r.type === 'plaisir' ? '<span class="tag tag-plaisir">plaisir</span>' : '<span class="tag tag-balance">equilibre</span>';
    return `<div class="recipe-select-item" onclick="selectMeal(${week},${day},'${meal}','${r.id}')">
      <strong>${r.name}</strong> ${typeLabel}
      <span class="tag ${r.difficulty === 'facile' ? 'tag-easy' : 'tag-medium'}">${r.difficulty}</span>
      <span style="font-size:0.8rem;color:var(--text-light);margin-left:0.5rem">${r.time}min</span>
    </div>`;
  }).join('');
}

function filterMealList(week, day, meal) {
  const q = document.getElementById('mealSearch').value.toLowerCase();
  const filtered = state.recipes.filter(r => r.name.toLowerCase().includes(q));
  document.getElementById('mealList').innerHTML = renderMealSelectList(filtered, week, day, meal);
}

function selectMeal(week, day, meal, recipeId) {
  state.menus[`${week}-${day}-${meal}`] = recipeId;
  saveState();
  closeModal();
  renderPlanning();
}

function removeMeal(week, day, meal) {
  delete state.menus[`${week}-${day}-${meal}`];
  saveState();
  renderPlanning();
}

// ============ SHOPPING ============
function generateShoppingList() {
  shoppingWeek = currentWeek;
  showTab('courses');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('nav button')[1].classList.add('active');
}

function renderShopping() {
  const sel = document.getElementById('weekSelector');
  sel.innerHTML = '';
  for (let w = 0; w < 13; w++) {
    const chip = document.createElement('span');
    chip.className = `week-chip ${w === shoppingWeek ? 'active' : ''}`;
    chip.textContent = `S${w + 1}`;
    chip.onclick = () => { shoppingWeek = w; renderShopping(); };
    sel.appendChild(chip);
  }

  const ingredients = {};
  for (let d = 0; d < 7; d++) {
    MEALS.forEach(meal => {
      const recipeId = state.menus[`${shoppingWeek}-${d}-${meal}`];
      if (!recipeId) return;
      const recipe = getRecipe(recipeId);
      if (!recipe) return;
      recipe.ingredients.forEach(ing => {
        const key = ing.name.toLowerCase();
        if (!ingredients[key]) ingredients[key] = {name: ing.name, cat: ing.cat, qtys: []};
        if (ing.qty) ingredients[key].qtys.push(ing.qty);
      });
    });
  }

  const categories = {};
  Object.values(ingredients).forEach(ing => {
    if (!categories[ing.cat]) categories[ing.cat] = [];
    categories[ing.cat].push(ing);
  });

  const customItems = (state.customItems || []).filter(i => i.week === shoppingWeek);
  if (customItems.length > 0) {
    if (!categories['Divers']) categories['Divers'] = [];
    customItems.forEach(ci => {
      categories['Divers'].push({name: ci.name, cat: 'Divers', qtys: [], custom: true, customId: ci.id});
    });
  }

  const shopKey = `shop-${shoppingWeek}`;
  if (!state.shopping[shopKey]) state.shopping[shopKey] = {};

  const content = document.getElementById('shoppingContent');

  if (Object.keys(categories).length === 0) {
    content.innerHTML = '<div class="card"><p style="color:var(--text-light)">Aucun menu prevu cette semaine.</p></div>';
    return;
  }

  const total = Object.values(ingredients).length + customItems.length;
  const checked = Object.keys(state.shopping[shopKey]).filter(k => state.shopping[shopKey][k]).length;

  let html = `<div class="card">
    <div class="stats"><span>${checked}/${total} articles coches</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${total ? (checked/total*100) : 0}%"></div></div>
  </div>`;

  const catOrder = ['Legumes','Fruits','Viandes','Poissons','Frais','Feculents','Boulangerie','Conserves','Surgeles','Epicerie','Divers'];
  const sortedCats = Object.keys(categories).sort((a, b) => {
    const ia = catOrder.indexOf(a), ib = catOrder.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });

  sortedCats.forEach(cat => {
    html += `<div class="shopping-section"><h4>${cat}</h4>`;
    categories[cat].forEach(item => {
      const itemKey = item.custom ? `custom-${item.customId}` : item.name.toLowerCase();
      const isChecked = state.shopping[shopKey][itemKey];
      const escapedKey = itemKey.replace(/'/g, "\\'");
      html += `
        <div class="shopping-item ${isChecked ? 'checked' : ''}" onclick="toggleShopItem('${shopKey}','${escapedKey}')">
          <input type="checkbox" ${isChecked ? 'checked' : ''} onclick="event.stopPropagation();toggleShopItem('${shopKey}','${escapedKey}')">
          <span class="item-text">${item.name}</span>
          <span class="item-qty">${item.qtys.join(' + ') || ''}</span>
          ${item.custom ? `<button onclick="event.stopPropagation();removeCustomItem('${item.customId}')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:1rem">&times;</button>` : ''}
        </div>`;
    });
    html += '</div>';
  });

  content.innerHTML = html;
}

function toggleShopItem(shopKey, itemKey) {
  if (!state.shopping[shopKey]) state.shopping[shopKey] = {};
  state.shopping[shopKey][itemKey] = !state.shopping[shopKey][itemKey];
  saveState();
  renderShopping();
}

function uncheckAll() {
  state.shopping[`shop-${shoppingWeek}`] = {};
  saveState();
  renderShopping();
}

function clearChecked() {
  const shopKey = `shop-${shoppingWeek}`;
  if (!state.shopping[shopKey]) return;
  Object.keys(state.shopping[shopKey]).forEach(k => {
    if (state.shopping[shopKey][k]) delete state.shopping[shopKey][k];
  });
  saveState();
  renderShopping();
}

function addCustomItem() {
  const input = document.getElementById('customItemInput');
  const name = input.value.trim();
  if (!name) return;
  if (!state.customItems) state.customItems = [];
  state.customItems.push({id: Date.now().toString(), name, week: shoppingWeek});
  input.value = '';
  saveState();
  renderShopping();
}

function removeCustomItem(id) {
  state.customItems = (state.customItems || []).filter(i => i.id !== id);
  saveState();
  renderShopping();
}

function printList() { window.print(); }

// ============ RECIPES ============
function renderRecipes() {
  const q = (document.getElementById('recipeSearch')?.value || '').toLowerCase();
  const grid = document.getElementById('recipeGrid');
  const filtered = state.recipes.filter(r => r.name.toLowerCase().includes(q));
  grid.innerHTML = filtered.map(r => {
    const typeTag = r.type === 'plaisir' ? '<span class="tag tag-plaisir">plaisir</span>' : '<span class="tag tag-balance">equilibre</span>';
    return `<div class="recipe-card">
      <h4>${r.name}</h4>
      <p>${r.category} &bull; ${r.time}min &bull; <span class="tag ${r.difficulty === 'facile' ? 'tag-easy' : 'tag-medium'}">${r.difficulty}</span> ${typeTag}</p>
      <p style="margin-top:0.3rem;font-size:0.8rem;color:var(--text-light)">${r.ingredients.map(i=>i.name).join(', ')}</p>
      <div class="recipe-actions">
        <button class="btn btn-outline btn-sm" onclick="viewRecipe('${r.id}')">Voir</button>
        <button class="btn btn-sm" style="background:#eee" onclick="editRecipe('${r.id}')">Modifier</button>
        ${r.id.startsWith('custom-') ? `<button class="btn btn-danger btn-sm" onclick="deleteRecipe('${r.id}')">Supprimer</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function viewRecipe(id) {
  const r = getRecipe(id);
  if (!r) return;
  const typeTag = r.type === 'plaisir' ? '<span class="tag tag-plaisir">plaisir</span>' : '<span class="tag tag-balance">equilibre</span>';
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <h3>${r.name}</h3>
    <p>${typeTag} <span class="tag ${r.difficulty === 'facile' ? 'tag-easy' : 'tag-medium'}">${r.difficulty}</span> &bull; ${r.time}min &bull; ${r.category}</p>
    <h4 style="margin-top:1rem;margin-bottom:0.5rem">Ingredients</h4>
    <ul style="padding-left:1.2rem">${r.ingredients.map(i => `<li>${i.name}${i.qty ? ' — ' + i.qty : ''}</li>`).join('')}</ul>
    <h4 style="margin-top:1rem;margin-bottom:0.5rem">Preparation</h4>
    <p style="font-size:0.9rem;line-height:1.5">${r.steps}</p>
    <div class="modal-actions"><button class="btn btn-primary" onclick="closeModal()">Fermer</button></div>`;
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function showRecipeForm(existingId) {
  const r = existingId ? getRecipe(existingId) : null;
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <h3>${r ? 'Modifier' : 'Nouvelle'} recette</h3>
    <div class="form-group">
      <label>Nom</label>
      <input type="text" id="rf-name" value="${r ? r.name : ''}">
    </div>
    <div class="form-group">
      <label>Type</label>
      <select id="rf-type">
        <option value="equilibre" ${r?.type==='equilibre'||!r?'selected':''}>Equilibre (semaine)</option>
        <option value="plaisir" ${r?.type==='plaisir'?'selected':''}>Plaisir (week-end)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Categorie</label>
      <select id="rf-cat">
        <option ${r?.category==='Plat'?'selected':''}>Plat</option>
        <option ${r?.category==='Entree'?'selected':''}>Entree</option>
        <option ${r?.category==='Accompagnement'?'selected':''}>Accompagnement</option>
        <option ${r?.category==='Dessert'?'selected':''}>Dessert</option>
      </select>
    </div>
    <div class="form-group">
      <label>Difficulte</label>
      <select id="rf-diff">
        <option value="facile" ${r?.difficulty==='facile'?'selected':''}>Facile</option>
        <option value="moyen" ${r?.difficulty==='moyen'?'selected':''}>Moyen</option>
      </select>
    </div>
    <div class="form-group">
      <label>Temps (min)</label>
      <input type="number" id="rf-time" value="${r ? r.time : 20}">
    </div>
    <div class="form-group">
      <label>Ingredients (un par ligne : Nom, Quantite, Categorie)</label>
      <textarea id="rf-ing" rows="6" placeholder="Pates completes, 500g, Feculents&#10;Sauce tomate, 500ml, Conserves">${r ? r.ingredients.map(i=>`${i.name}, ${i.qty}, ${i.cat}`).join('\n') : ''}</textarea>
      <small style="color:var(--text-light)">Categories : Legumes, Fruits, Viandes, Poissons, Frais, Feculents, Boulangerie, Conserves, Surgeles, Epicerie</small>
    </div>
    <div class="form-group">
      <label>Etapes de preparation</label>
      <textarea id="rf-steps">${r ? r.steps : ''}</textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveRecipe('${existingId || ''}')">Enregistrer</button>
    </div>`;
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function editRecipe(id) { showRecipeForm(id); }

function saveRecipe(existingId) {
  const name = document.getElementById('rf-name').value.trim();
  if (!name) { alert('Le nom est obligatoire'); return; }
  const ingredients = document.getElementById('rf-ing').value.trim().split('\n').filter(l=>l.trim()).map(line => {
    const parts = line.split(',').map(s => s.trim());
    return {name: parts[0] || '', qty: parts[1] || '', cat: parts[2] || 'Epicerie'};
  });
  const recipe = {
    id: existingId || 'custom-' + Date.now(),
    name,
    type: document.getElementById('rf-type').value,
    category: document.getElementById('rf-cat').value,
    difficulty: document.getElementById('rf-diff').value,
    time: parseInt(document.getElementById('rf-time').value) || 20,
    ingredients,
    steps: document.getElementById('rf-steps').value.trim()
  };
  if (existingId) {
    const idx = state.recipes.findIndex(r => r.id === existingId);
    if (idx >= 0) state.recipes[idx] = recipe;
  } else {
    state.recipes.push(recipe);
  }
  saveState();
  closeModal();
  renderRecipes();
}

function deleteRecipe(id) {
  if (!confirm('Supprimer cette recette ?')) return;
  state.recipes = state.recipes.filter(r => r.id !== id);
  Object.keys(state.menus).forEach(k => {
    if (state.menus[k] === id) delete state.menus[k];
  });
  saveState();
  renderRecipes();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
}

// ============ INIT ============
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
renderPlanning();
</script>
