async function viewExtRecipeById(id) {
  try {
    const resp = await fetch(`${MEALDB_API}/lookup.php?i=${id}`);
    const data = await resp.json();
    if (!data.meals || !data.meals[0]) return;
    const meal = data.meals[0];
    const parsed = parseMealDBRecipe(meal);
    showExtRecipeModal(parsed, meal);
  } catch(e) { alert('Erreur de chargement.'); }
}

function showExtRecipeModal(parsed, meal) {
  const modal = document.getElementById('modalContent');
  const isSaved = isExtRecipeSaved(meal.idMeal);
  // Group ingredients by category
  const ingByCat = {};
  parsed.ingredients.forEach(i => {
    if (!ingByCat[i.cat]) ingByCat[i.cat] = [];
    ingByCat[i.cat].push(i);
  });
  let ingHtml = '';
  Object.keys(ingByCat).forEach(cat => {
    ingHtml += `<div style="margin-bottom:0.3rem"><strong style="font-size:0.8rem;color:var(--text-light)">${cat}</strong>`;
    ingHtml += '<ul style="padding-left:1.2rem;margin:0.2rem 0">' + ingByCat[cat].map(i => `<li>${i.name}${i.qty ? ' — <em>' + i.qty + '</em>' : ''}</li>`).join('') + '</ul></div>';
  });
  // Steps
  const stepsText = parsed.steps;
  const lines = stepsText.split(/\r?\n/).filter(l => l.trim());
  let stepsHtml;
  if (lines.length > 1) {
    stepsHtml = '<ol style="padding-left:1.2rem;font-size:0.9rem;line-height:1.6">' + lines.map(l => `<li style="margin-bottom:0.4rem">${l.replace(/^[\d]+[\.\)]\s*/, '').trim()}</li>`).join('') + '</ol>';
  } else {
    stepsHtml = `<p style="font-size:0.9rem;line-height:1.6">${stepsText}</p>`;
  }
  const showOriginal = parsed.name !== meal.strMeal;
  modal.innerHTML = `
    ${meal.strMealThumb ? `<img src="${meal.strMealThumb}/preview" alt="" style="width:100%;border-radius:8px;margin-bottom:1rem;max-height:200px;object-fit:cover">` : ''}
    <h3>${parsed.name}</h3>
    ${showOriginal ? `<p style="font-size:0.8rem;color:#999;font-style:italic;margin-bottom:0.3rem">${meal.strMeal}</p>` : ''}
    <p style="margin-bottom:0.5rem"><span style="font-size:0.85rem;color:var(--text-light)">${meal.strArea || ''} &bull; ${meal.strCategory || ''}</span>
    ${isSaved ? ' <span class="ext-saved-badge">Deja importe</span>' : ''}</p>
    <h4 style="margin-top:0.8rem;margin-bottom:0.5rem">Ingredients</h4>
    ${ingHtml}
    <h4 style="margin-top:1rem;margin-bottom:0.5rem">Preparation</h4>
    ${stepsHtml}
    <div class="modal-actions">
      ${!isSaved ? `<button class="btn btn-primary" onclick="importExtRecipe(${meal.idMeal});closeModal()">Importer dans mes recettes</button>` : ''}
      ${meal.strYoutube ? `<a href="${meal.strYoutube}" target="_blank" class="btn btn-accent" style="text-decoration:none">Voir la video</a>` : ''}
      <button class="btn btn-outline" onclick="closeModal()">Fermer</button>
    </div>`;
  document.getElementById('modalOverlay').classList.remove('hidden');
}

async function importExtRecipeById(id) {
  try {
    const resp = await fetch(`${MEALDB_API}/lookup.php?i=${id}`);
    const data = await resp.json();
    if (!data.meals || !data.meals[0]) return;
    importExtRecipe(id, data.meals[0]);
  } catch(e) { alert('Erreur de chargement.'); }
}

function importExtRecipe(id, mealData) {
  // If mealData not provided, fetch it
  if (!mealData) {
    fetch(`${MEALDB_API}/lookup.php?i=${id}`)
      .then(r => r.json())
      .then(data => { if (data.meals && data.meals[0]) importExtRecipe(id, data.meals[0]); });
    return;
  }
  if (isExtRecipeSaved(id)) return;
  const parsed = parseMealDBRecipe(mealData);
  const recipe = {
    id: 'ext-' + id,
    name: parsed.name,
    category: parsed.category,
    type: 'equilibre',
    difficulty: parsed.difficulty,
    time: parsed.time,
    ingredients: parsed.ingredients,
    steps: parsed.steps,
    thumb: parsed.thumb,
    source: 'themealdb'
  };
  state.recipes.push(recipe);
  saveState();
  // Refresh display
  renderExtSaved();
  // Re-render results to show "Importe" badge
  const searchInput = document.getElementById('extSearch');
  if (searchInput && searchInput.value.trim()) searchExtRecipes();
  alert('Recette "' + parsed.name + '" importee ! Vous pouvez maintenant l\'utiliser dans le planning.');
}

function isExtRecipeSaved(mealdbId) {
  return state.recipes.some(r => r.id === 'ext-' + mealdbId);
}

function renderExtSaved() {
  const container = document.getElementById('extSaved');
  const extRecipes = state.recipes.filter(r => r.id.startsWith('ext-'));
  if (extRecipes.length === 0) {
    container.innerHTML = '';
    return;
  }
  let html = '<div class="card"><h3>Mes recettes importees (' + extRecipes.length + ')</h3>';
  html += '<div class="ext-grid" style="margin-top:0.8rem">';
  extRecipes.forEach(r => {
    html += `<div class="ext-card" style="display:flex;align-items:center;gap:0.8rem;padding:0.6rem">
      ${r.thumb ? `<img src="${r.thumb}/preview" alt="" style="width:60px;height:60px;border-radius:8px;object-fit:cover">` : ''}
      <div style="flex:1;min-width:0">
        <h4 style="font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.name}</h4>
        <div class="ext-actions" style="margin-top:0.3rem">
          <button class="btn btn-outline btn-sm" onclick="viewRecipe('${r.id}')">Voir</button>
          <button class="btn btn-danger btn-sm" onclick="deleteExtRecipe('${r.id}')">Retirer</button>
        </div>
      </div>
    </div>`;
  });
  html += '</div></div>';
  container.innerHTML = html;
}

function deleteExtRecipe(id) {
  if (!confirm('Retirer cette recette importee ?')) return;
  state.recipes = state.recipes.filter(r => r.id !== id);
  // Remove from menus too
  Object.keys(state.menus).forEach(k => {
    if (state.menus[k] === id) delete state.menus[k];
  });
  saveState();
  renderExtSaved();
}

function initExtCategories() {
  const cats = ['Chicken','Beef','Seafood','Pasta','Vegetarian','Pork','Lamb','Dessert','Breakfast','Side'];
  const container = document.getElementById('extCats');
  container.innerHTML = cats.map(c => `<button onclick="browseExtCategory('${c}')">${c}</button>`).join('');
}

// ============ RECETTES FR (750g) ============
let frRecipesData = [];
let frFilter = '';

async function loadFrRecipes() {
  if (frRecipesData.length > 0) return;
  try {
    const resp = await fetch('recettes-fr.json');
    frRecipesData = await resp.json();
  } catch(e) {
    console.error('Erreur chargement recettes FR:', e);
  }
}

function renderFrRecipes() {
  const q = (document.getElementById('frSearch')?.value || '').toLowerCase();
  let recipes = frRecipesData;
  if (q) recipes = recipes.filter(r => r.name.toLowerCase().includes(q) || r.ingredients.some(i => i.name.toLowerCase().includes(q)));
  if (frFilter) recipes = recipes.filter(r => {
    if (frFilter === 'Viandes') return r.ingredients.some(i => i.cat === 'Viandes');
    if (frFilter === 'Poissons') return r.ingredients.some(i => i.cat === 'Poissons');
    if (frFilter === 'Vegetarien') return !r.ingredients.some(i => i.cat === 'Viandes' || i.cat === 'Poissons');
    if (frFilter === 'Rapide') return r.time <= 30;
    if (frFilter === 'Familial') return r.servings >= 4;
    return true;
  });
  const grid = document.getElementById('frResults');
  if (recipes.length === 0) {
    grid.innerHTML = '<div class="ext-loading">Aucune recette trouvee.</div>';
    return;
  }
  grid.innerHTML = recipes.map(r => {
    const isSaved = state.recipes.some(sr => sr.id === r.id);
    const ingPreview = r.ingredients.slice(0, 4).map(i => i.name).join(', ');
    const timeLabel = r.time >= 60 ? Math.floor(r.time/60) + 'h' + (r.time%60 > 0 ? r.time%60 : '') : r.time + ' min';
    return `<div class="ext-card" style="cursor:default">
      <div class="ext-body">
        <h4>${r.name} ${isSaved ? '<span class="ext-saved-badge">Importe</span>' : ''}</h4>
        <p>${timeLabel} &bull; ${r.servings} pers. &bull; ${r.difficulty}</p>
        <p style="margin-top:0.3rem;font-size:0.8rem;color:var(--text-light)">${ingPreview}...</p>
        <div class="ext-actions">
          <button class="btn btn-outline btn-sm" onclick="viewFrRecipe('${r.id}')">Voir</button>
          ${!isSaved ? `<button class="btn btn-primary btn-sm" onclick="importFrRecipe('${r.id}')">Ajouter au planning</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterFrRecipes(cat) {
  frFilter = frFilter === cat ? '' : cat;
  document.querySelectorAll('#frCats button').forEach(b => b.classList.toggle('active', b.dataset.cat === frFilter));
  renderFrRecipes();
}

function viewFrRecipe(id) {
  const r = frRecipesData.find(x => x.id === id);
  if (!r) return;
  const modal = document.getElementById('modalContent');
  const isSaved = state.recipes.some(sr => sr.id === r.id);
  // Group ingredients by category
  const ingByCat = {};
  r.ingredients.forEach(i => { if (!ingByCat[i.cat]) ingByCat[i.cat] = []; ingByCat[i.cat].push(i); });
  let ingHtml = '';
  Object.keys(ingByCat).forEach(cat => {
    ingHtml += `<div style="margin-bottom:0.3rem"><strong style="font-size:0.8rem;color:var(--text-light)">${cat}</strong>`;
    ingHtml += '<ul style="padding-left:1.2rem;margin:0.2rem 0">' + ingByCat[cat].map(i => `<li>${i.name}${i.qty ? ' — <em>' + i.qty + '</em>' : ''}</li>`).join('') + '</ul></div>';
  });
  // Steps
  const stepsText = r.steps || '';
  const numberedSteps = stepsText.match(/\d+\.\s[^]*?(?=\d+\.|$)/g);
  let stepsHtml;
  if (numberedSteps && numberedSteps.length > 1) {
    stepsHtml = '<ol style="padding-left:1.2rem;font-size:0.9rem;line-height:1.6">' + numberedSteps.map(s => `<li style="margin-bottom:0.4rem">${s.replace(/^\d+\.\s*/, '').trim()}</li>`).join('') + '</ol>';
  } else {
    stepsHtml = `<p style="font-size:0.9rem;line-height:1.5">${stepsText}</p>`;
  }
  const timeLabel = r.time >= 60 ? Math.floor(r.time/60) + 'h' + (r.time%60 > 0 ? r.time%60 : '') : r.time + ' min';
  modal.innerHTML = `
    <h3>${r.name}</h3>
    <p style="margin-bottom:0.5rem"><span style="font-size:0.85rem;color:var(--text-light)">${timeLabel} &bull; ${r.servings} personnes &bull; ${r.difficulty}</span>
    ${isSaved ? ' <span class="ext-saved-badge">Dans le planning</span>' : ''}</p>
    <h4 style="margin-top:0.8rem;margin-bottom:0.5rem">Ingredients</h4>
    ${ingHtml}
    <h4 style="margin-top:1rem;margin-bottom:0.5rem">Preparation</h4>
    ${stepsHtml}
    <div class="modal-actions">
      ${!isSaved ? `<button class="btn btn-primary" onclick="importFrRecipe('${r.id}');closeModal()">Ajouter au planning</button>` : ''}
      <button class="btn btn-outline" onclick="closeModal()">Fermer</button>
    </div>`;
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function importFrRecipe(id) {
  const r = frRecipesData.find(x => x.id === id);
  if (!r || state.recipes.some(sr => sr.id === r.id)) return;
  state.recipes.push({
    id: r.id,
    name: r.name,
    category: 'Plat',
    type: 'equilibre',
    difficulty: r.difficulty,
    time: r.time,
    ingredients: r.ingredients,
    steps: r.steps,
    source: 'fr'
  });
  saveState();
  renderFrRecipes();
}

function initFrCategories() {
  const cats = [
    {id:'Viandes',label:'Viandes'},
    {id:'Poissons',label:'Poissons'},
    {id:'Vegetarien',label:'Vegetarien'},
    {id:'Rapide',label:'Rapide (< 30 min)'},
    {id:'Familial',label:'Familial (4+ pers.)'}
  ];
  document.getElementById('frCats').innerHTML = cats.map(c => `<button data-cat="${c.id}" onclick="filterFrRecipes('${c.id}')">${c.label}</button>`).join('');
}
